<!DOCTYPE html>
<html>
<head>
    <title>Business Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/app.js"></script>

<body onload="loadBusinessProfile()">

    window.location = "business-login.html";
}
</script>

<input id="businessName"><br>
<input id="ownerName"><br>
<input id="category"><br>

<input id="location"><br>

<button onclick="updateBusiness()">Update Profile</button>

</body>
</html>
