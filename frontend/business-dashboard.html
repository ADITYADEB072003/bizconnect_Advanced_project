<!DOCTYPE html>
<html>
<head>
    <title>Business Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/app.js"></script>
</head>
<body onload="loadBusinessProfile()">

<script>
if (!localStorage.getItem("token") || localStorage.getItem("role") !== "business") {
    window.location = "business-login.html";
}
</script>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">BizConnect</div>
    <button class="btn danger" onclick="logout()">Logout</button>
</nav>

<!-- DASHBOARD -->
<div class="dashboard-container">
    
    <h2>Edit Business Profile</h2>

    <!-- IMAGE PREVIEW -->
    <div class="image-preview">
        <img id="previewImage" src="" alt="Business Image">
    </div>

    <!-- FORM -->
    <form onsubmit="updateBusiness(event)">
        
        <label>Business Name</label>
        <input id="businessName" required>

        <label>Owner Name</label>
        <input id="ownerName">

        <label>Category</label>
        <input id="category">

        <label>Description</label>
        <textarea id="description"></textarea>

        <label>Location</label>
        <input id="location">

        <label>Upload Business Image</label>
        <input type="file" id="image" accept="image/*" onchange="previewImage(event)">

        <button type="submit" class="btn full">Update Profile</button>

    </form>
</div>

</body>
</html>
