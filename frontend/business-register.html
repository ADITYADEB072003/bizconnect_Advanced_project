<!DOCTYPE html>
<html>
<head>
    <title>Business Register</title>
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/app.js"></script>
</head>
<body>

<div class="auth-container">
    <h2>Business Register</h2>

    <input id="businessName" placeholder="Business Name">
    <input id="ownerName" placeholder="Owner Name">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <input id="category" placeholder="Category">
    <textarea id="description" placeholder="Description"></textarea>
    <input id="location" placeholder="Location">

    <button class="btn full" onclick="businessRegister()">Register</button>
</div>

</body>
</html>
